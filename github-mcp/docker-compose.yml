services:
  github-mcp:
    build: .
    container_name: github-mcp
    restart: always
    ports:
      # Loopback-only: the host-process proxy reaches the MCP at 127.0.0.1; it must
      # not be LAN-reachable. (On T2 compose_rewrite strips published ports entirely
      # and the proxy reaches the container by service-DNS instead.)
      - "127.0.0.1:8935:8935"
    # MCP_PORT is auto-injected from manifest.env by docker_manager._inject_mcp_env.
    # GITHUB_HOST (optional) for GitHub Enterprise; default = github.com.
    env_file: .env
